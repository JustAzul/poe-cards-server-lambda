name: CI/CD Pipeline
on:
  push:
    branches: [master]

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --coverage

  deploy:
    name: Deploy to Lambda
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Prune dev dependencies
        run: npm prune --omit=dev
      - name: Bundle
        run: zip -qq -r ./bundle.zip dist/ package.json node_modules/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
          --function-name poe-cards \
          --zip-file fileb://bundle.zip
      - name: Update Lambda configuration
        run: |
          aws lambda wait function-updated --function-name poe-cards
          aws lambda update-function-configuration \
          --function-name poe-cards \
          --runtime nodejs20.x \
          --handler dist/index.handler \
          --timeout 900 \
          --memory-size 512 \
          --environment "Variables={R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }},R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }},R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }},R2_BUCKET=${{ secrets.R2_BUCKET }},R2_ENDPOINT=${{ secrets.R2_ENDPOINT }},REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }},BROADCAST_SECRET=${{ secrets.BROADCAST_SECRET }},REVALIDATE_URL=${{ secrets.REVALIDATE_URL }},BROADCAST_URL=${{ secrets.BROADCAST_URL }}}"
