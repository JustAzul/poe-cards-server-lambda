name: CI/CD Pipeline
on:
  push:
    branches: [master]

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --coverage

  deploy:
    name: Deploy to Lambda
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Prune dev dependencies
        run: npm prune --omit=dev
      - name: Bundle
        run: zip -qq -r ./bundle.zip dist/ package.json node_modules/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
          --function-name poe-cards \
          --zip-file fileb://bundle.zip
      - name: Update Lambda configuration
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          BROADCAST_SECRET: ${{ secrets.BROADCAST_SECRET }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          BROADCAST_URL: ${{ secrets.BROADCAST_URL }}
        run: |
          aws lambda wait function-updated --function-name poe-cards
          jq -n \
            --arg r2_account_id "$R2_ACCOUNT_ID" \
            --arg r2_access_key_id "$R2_ACCESS_KEY_ID" \
            --arg r2_secret_access_key "$R2_SECRET_ACCESS_KEY" \
            --arg r2_bucket "$R2_BUCKET" \
            --arg r2_endpoint "$R2_ENDPOINT" \
            --arg revalidate_secret "$REVALIDATE_SECRET" \
            --arg broadcast_secret "$BROADCAST_SECRET" \
            --arg revalidate_url "$REVALIDATE_URL" \
            --arg broadcast_url "$BROADCAST_URL" \
            '{Variables: {R2_ACCOUNT_ID: $r2_account_id, R2_ACCESS_KEY_ID: $r2_access_key_id, R2_SECRET_ACCESS_KEY: $r2_secret_access_key, R2_BUCKET: $r2_bucket, R2_ENDPOINT: $r2_endpoint, REVALIDATE_SECRET: $revalidate_secret, BROADCAST_SECRET: $broadcast_secret, REVALIDATE_URL: $revalidate_url, BROADCAST_URL: $broadcast_url}}' \
            > lambda-env.json
          aws lambda update-function-configuration \
          --function-name poe-cards \
          --runtime nodejs20.x \
          --handler dist/index.handler \
          --timeout 900 \
          --memory-size 512 \
          --environment file://lambda-env.json
          rm -f lambda-env.json
      - name: Reconcile EventBridge schedule
        # Best-effort: the deploy IAM user currently has AWSLambda_FullAccess only, no
        # events:* grants, so this fails with AccessDeniedException until that's widened.
        # continue-on-error keeps that a visible warning instead of a red Lambda deploy;
        # the rule is already ENABLED in prod today independent of this step succeeding.
        continue-on-error: true
        env:
          RULE_NAME: poe.cards
          FUNCTION_NAME: poe-cards
          AWS_REGION_NAME: us-east-2
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          RULE_ARN="arn:aws:events:${AWS_REGION_NAME}:${ACCOUNT_ID}:rule/${RULE_NAME}"
          FUNCTION_ARN="arn:aws:lambda:${AWS_REGION_NAME}:${ACCOUNT_ID}:function:${FUNCTION_NAME}"

          aws events put-rule --name "$RULE_NAME" --schedule-expression "rate(1 hour)" --state ENABLED
          aws lambda add-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id "${RULE_NAME}-eventbridge" \
            --action lambda:InvokeFunction \
            --principal events.amazonaws.com \
            --source-arn "$RULE_ARN" || true
          aws events put-targets --rule "$RULE_NAME" --targets "Id=1,Arn=${FUNCTION_ARN}"
